{% load static %}
<!DOCTYPE html>
<html dir="rtl" lang="fa">

<!-- Mirrored from www.iarsalan.ir/template/mocart/index-3.html by HTTrack Website Copier/3.x [XR&CO'2014], Tue, 28 Oct 2025 19:27:37 GMT -->
<head>
    <!-- meta tags -->
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta content="" name="description"/>
    <meta content="" name="keywords"/>
    <!-- title -->
    <title>
        Mocart - قالب HTML5 فروشگاهی و چندمنظوره
    </title>
    <!-- favicon -->
    <link href="{% static "img/logo/favicon.png" %}" rel="icon" type="image/x-icon"/>
    <!-- css -->
    <link href="{% static "css/bootstrap.min.css" %}" rel="stylesheet"/>
    <link href="{% static "css/all-fontawesome.min.css" %}" rel="stylesheet"/>
    <link href="{% static "css/animate.min.css" %}" rel="stylesheet"/>
    <link href="{% static "css/magnific-popup.min.css" %}" rel="stylesheet"/>
    <link href="{% static "css/owl.carousel.min.css" %}" rel="stylesheet"/>
    <link href="{% static "css/jquery-ui.min.css" %}" rel="stylesheet"/>
    <link href="{% static "css/nice-select.min.css" %}" rel="stylesheet"/>
    <link href="{% static "css/style.css" %}" rel="stylesheet"/>
</head>


   <!-- login area -->
   <div class="login-area py-100">
	<div class="container">
	 <div class="col-md-7 col-lg-5 mx-auto">
	  <div class="login-form">
	   <div class="login-header">
		<img alt="" src="{% static "img/logo/logo.png" %}"/>
		<p>
		 با حساب mocart خود وارد شوید
		</p>
	   </div>
	   <form  method="post">
           {% csrf_token %}
		<div class="form-group">
		 <label>
		 ایمیل/موبایل
		 </label>
		 {{ form.username }}
		</div>
		<div class="form-group">
		 <label>
		  رمز
		 </label>
		 {{ form.password }}
		</div>
		<div class="d-flex justify-content-between mb-4">
		 <div class="form-check">
		  <input class="form-check-input" id="remember" type="checkbox" value=""/>
		  <label class="form-check-label" for="remember">
		   مرا به خاطر بسپار
		  </label>
		 </div>
		 <a class="forgot-pass" href="forgot-password.html">
		  رمز عبور را فراموش کرده اید؟
		 </a>
		</div>
		<div class="d-flex align-items-center">
		 <button class="theme-btn" type="submit">
		  <i class="far fa-sign-in">
		  </i>
		  وارد شوید
		 </button>
		</div>
	   </form>
	   <div class="login-footer">
		<p>
		 حساب کاربری ندارید؟
		 <a href="{% url "account:Register" %}">
		  ثبت نام کنید
		 </a>
		</p>
		<div class="social-login">
		 <span class="social-divider">
		  یا
		 </span>
		 <p>
		  با شبکه های اجتماعی ادامه دهید
		 </p>
		 <div class="social-login-list">
		  <a class="fb-auth" href="#">
		   <i class="fab fa-facebook-f">
		   </i>
		   فیس بوک
		  </a>
		  <a class="gl-auth" href="#">
		   <i class="fab fa-google">
		   </i>
		   گوگل
		  </a>
		  <a class="tw-auth" href="#">
		   <i class="fab fa-x-twitter">
		   </i>
		   توییتر
		  </a>
		 </div>
		</div>
	   </div>
	  </div>
	 </div>
	</div>
   </div>
   <!-- login area end -->
 </body>
</html>
